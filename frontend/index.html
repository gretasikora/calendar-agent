<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:5000 http://127.0.0.1:5000;">
    <title>Calendar Booking Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main App -->
    <div id="app-container" class="container" style="display: flex;">
        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <!-- Messages will be added here dynamically -->
            </div>
            
            <div id="input-section" class="input-section">
                <!-- Input elements will be shown/hidden based on conversation state -->
            </div>
        </div>
        <button id="back-btn" class="back-btn" onclick="goBack()">← Back</button>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
